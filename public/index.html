<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satranç Oyunu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { display: block; }
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 10;
        }
        #ui h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #f0c040; }
        #ui input, #ui select {
            padding: 0.5rem 1rem;
            margin: 0.4rem;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
            width: 220px;
        }
        #ui button {
            margin-top: 1rem;
            padding: 0.7rem 2rem;
            background: #f0c040;
            color: #1a1a2e;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #ui button:hover { background: #e0a820; }
        #hud {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 8px 14px;
            border-radius: 8px;
            display: none;
        }
        #hud span { display: block; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>♟ Satranç Oyunu</h1>
        <input id="isim" type="text" placeholder="Adın" maxlength="20" />
        <select id="tasTipi">
            <option value="piyon">Piyon (2 can)</option>
            <option value="kale">Kale (5 can)</option>
            <option value="fil">Fil (4 can)</option>
            <option value="at">At (4 can)</option>
            <option value="vezir">Vezir (8 can)</option>
            <option value="sah">Şah (10 can)</option>
        </select>
        <button id="basla">Oyuna Gir</button>
    </div>
    <div id="hud">
        <span id="hud-isim">-</span>
        <span id="hud-can">-</span>
        <span id="hud-takim">-</span>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <!-- Colyseus istemci CDN -->
    <script src="https://unpkg.com/colyseus.js@0.15.8/dist/colyseus.js"></script>
    <script src="client.js"></script>
</body>
</html>
